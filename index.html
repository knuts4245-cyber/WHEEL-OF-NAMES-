<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wheel of Names</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Roboto:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Roboto',sans-serif;font-size:14px;color:#202124;background:#f8f9fa}

/* NAV */
.topbar{height:56px;background:#fff;border-bottom:1px solid #dadce0;display:flex;align-items:center;padding:0 8px 0 14px;flex-shrink:0;position:relative;z-index:200}
.logo-area{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;margin-right:auto;text-decoration:none}
.logo-svg{width:32px;height:32px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:500;color:#202124;white-space:nowrap}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 10px;border:none;background:transparent;cursor:pointer;border-radius:6px;transition:background .15s;font-family:'Roboto',sans-serif;font-size:11px;color:#5f6368;white-space:nowrap;min-width:54px}
.nav-btn:hover{background:#f1f3f4}
.nav-btn svg{width:20px;height:20px;fill:#5f6368}
.nav-sep{width:1px;height:28px;background:#dadce0;margin:0 2px;flex-shrink:0}
.nav-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:transparent;cursor:pointer;border-radius:50%;transition:background .15s;flex-shrink:0}
.nav-icon:hover{background:#f1f3f4}
.nav-icon svg{width:22px;height:22px;fill:#5f6368}
.nav-text{display:flex;align-items:center;gap:3px;padding:7px 10px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-family:'Roboto',sans-serif;font-size:13px;color:#5f6368;white-space:nowrap;transition:background .15s}
.nav-text:hover{background:#f1f3f4}
.nav-text svg{width:16px;height:16px;fill:#5f6368}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 56px);overflow:hidden}

/* STAGE */
.stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(150deg,#fce4ec 0%,#f3e5f5 25%,#ede7f6 50%,#e8eaf6 75%,#e3f2fd 100%)}

.edit-fab{position:absolute;top:14px;left:14px;width:42px;height:42px;border-radius:50%;background:#1a73e8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(26,115,232,.4);z-index:10;transition:background .15s}
.edit-fab:hover{background:#1557b0}
.edit-fab svg{width:20px;height:20px;fill:#fff}

/* WHEEL */
.wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
#wheelCanvas{display:block;filter:drop-shadow(0 4px 24px rgba(0,0,0,.2)) drop-shadow(0 12px 48px rgba(0,0,0,.12))}

/* Click to spin overlay */
.spin-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:6;transition:opacity .3s}
.spin-overlay.hidden{opacity:0}
.spin-line1{font-family:'Patrick Hand',cursive;font-size:clamp(20px,3.2vw,40px);font-style:italic;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6),0 0 30px rgba(0,0,0,.25);line-height:1.1;white-space:nowrap}
.spin-line2{font-family:'Roboto',sans-serif;font-size:clamp(10px,1.2vw,14px);font-style:italic;color:rgba(255,255,255,.85);text-shadow:0 1px 6px rgba(0,0,0,.5);margin-top:5px;white-space:nowrap}

/* Pointer */
.ptr-outer{position:absolute;right:0;top:50%;transform:translateY(-50%);z-index:20;pointer-events:none;filter:drop-shadow(-2px 1px 4px rgba(0,0,0,.4))}

/* RIGHT PANEL */
.panel{width:366px;flex-shrink:0;background:#fff;border-left:1px solid #dadce0;display:flex;flex-direction:column;overflow:hidden}

/* Tab bar */
.tab-bar{display:flex;align-items:stretch;border-bottom:1px solid #dadce0;flex-shrink:0;height:48px}
.spin-tab-btn{width:48px;background:#1a73e8;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-right:1px solid rgba(255,255,255,.12);transition:background .15s}
.spin-tab-btn:hover{background:#1557b0}
.spin-tab-btn:active{background:#0d47a1}
.spin-tab-btn svg{width:26px;height:26px;fill:#fff}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;padding:0 8px;user-select:none}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}
.tab-n{background:#e8f0fe;color:#1a73e8;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.tab.active .tab-n{background:#1a73e8;color:#fff}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:4px;padding:7px 8px;border-bottom:1px solid #dadce0;flex-shrink:0}
.tb{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:4px;background:#1a73e8;color:#fff;border:none;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap}
.tb:hover{background:#1557b0}
.tb svg{width:15px;height:15px;flex-shrink:0;fill:#fff}
.tb.outline{background:transparent;color:#3c4043;border:1px solid #dadce0}
.tb.outline:hover{background:#f1f3f4}
.tb.outline svg{fill:#3c4043}
.adv-lbl{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:12px;color:#5f6368;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* Textarea */
.ta-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.ta{flex:1;width:100%;border:none;outline:none;resize:none;font-family:'Roboto',sans-serif;font-size:14px;color:#202124;padding:10px 14px;line-height:2.1;background:#fff}
.ta::placeholder{color:#bdc1c6}

/* Results */
.res-wrap{flex:1;overflow-y:auto;display:block}
.r-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f1f3f4;font-size:14px;color:#3c4043}
.r-num{color:#9aa0a6;font-size:12px;min-width:20px;text-align:right;flex-shrink:0}
.r-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Footer */
.panel-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid #dadce0;flex-shrink:0}
.add-grp{display:flex}
.add-main{display:flex;align-items:center;gap:6px;background:#1a73e8;color:#fff;border:none;border-radius:4px 0 0 4px;padding:8px 14px;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500}
.add-arr{background:#1a73e8;color:#fff;border:none;border-left:1px solid rgba(255,255,255,.25);border-radius:0 4px 4px 0;padding:8px 10px;cursor:pointer;font-size:13px}
.beta{background:#f9ab00;color:#202124;font-size:10px;font-weight:700;border-radius:3px;padding:1px 5px}
.ver{font-size:11px;color:#9aa0a6}.ver a{color:#1a73e8;text-decoration:none}

/* WINNER MODAL */
.modal-bg{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.modal-bg.open{display:flex}
.w-card{background:#fff;border-radius:16px;width:min(480px,94vw);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.4);animation:pop .26s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.w-rainbow{height:10px;background:linear-gradient(90deg,#ea4335 0 14.3%,#fa7b17 14.3% 28.6%,#fbbc04 28.6% 42.9%,#34a853 42.9% 57.1%,#4285f4 57.1% 71.4%,#a142f4 71.4% 85.7%,#ea4335 85.7% 100%)}
.w-head{background:#4285f4;padding:18px 28px;display:flex;align-items:center;justify-content:center;gap:12px}
.w-head-txt{font-size:20px;font-weight:700;color:#fff}
.w-body{padding:32px 36px 28px;text-align:center}
.w-name{font-size:clamp(26px,6vw,50px);font-weight:700;margin-bottom:28px;line-height:1.2;word-break:break-word}
.w-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.wbtn{flex:1;min-width:110px;max-width:175px;padding:13px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .14s}
.wbtn-x{background:#f1f3f4;color:#3c4043}.wbtn-x:hover{background:#e8eaed}
.wbtn-rm{background:#ea4335;color:#fff}.wbtn-rm:hover{background:#c5221f}
.wbtn-rma{background:#4285f4;color:#fff}.wbtn-rma:hover{background:#1a73e8}

/* Confetti */
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.cp{position:fixed;top:-14px;pointer-events:none;z-index:9999;animation:fall linear forwards}
</style>
</head>

<script>
'use strict';

// ─── CRYPTO RNG ───────────────────────────────────────────────────────────────
function cryptoRand() {
  const buf = new Uint32Array(1);
  crypto.getRandomValues(buf);
  return buf[0] / (0xFFFFFFFF + 1);
}

// ─── COLOURS ─────────────────────────────────────────────────────────────────
const COLORS = [
  '#ea4335','#4285f4','#fbbc04','#34a853',
  '#e91e63','#00bcd4','#ff5722','#3f51b5',
  '#ff9800','#009688','#9c27b0','#607d8b',
  '#f06292','#64b5f6','#aed581','#ffcc02'
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let entries  = [];
let results  = [];
let ang      = 0;
let spinning = false;
let sz       = 500;
let winIdx   = -1;
let winLabel = '';

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let AudioCtx = null;
function getAC() {
  if (!AudioCtx) AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return AudioCtx;
}

function playTick(speed) {
  try {
    const c = getAC(), t = c.currentTime;
    const pitch = 0.5 + speed * 2.5;
    const dur = 0.06;
    const buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 4);
    const src = c.createBufferSource(); src.buffer = buf; src.playbackRate.value = pitch;
    const bp  = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2200 * pitch; bp.Q.value = 1.4;
    const g   = c.createGain(); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    src.start(t); src.stop(t + dur + 0.01);
  } catch(e) {}
}

function playFanfare() {
  try {
    const c = getAC(), t = c.currentTime;
    [[523.25,0,.9],[659.25,.1,.85],[783.99,.2,.8],[1046.5,.3,1.0]].forEach(([f,dt,dur]) => {
      const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t+dt);
      g.gain.linearRampToValueAtTime(0.15, t+dt+0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t+dt+dur);
      o.connect(g); g.connect(c.destination); o.start(t+dt); o.stop(t+dt+dur+0.05);
    });
    const sw = c.createOscillator(); sw.type = 'sine';
    sw.frequency.setValueAtTime(440,t+.32); sw.frequency.linearRampToValueAtTime(1100,t+.9);
    const sg = c.createGain(); sg.gain.setValueAtTime(.08,t+.32); sg.gain.exponentialRampToValueAtTime(.001,t+1.1);
    sw.connect(sg); sg.connect(c.destination); sw.start(t+.32); sw.stop(t+1.15);
    const al = Math.floor(c.sampleRate*2.5), ab = c.createBuffer(2,al,c.sampleRate);
    for (let ch=0; ch<2; ch++) { const dd=ab.getChannelData(ch); for(let i=0;i<al;i++){const e=Math.pow(Math.max(0,1-i/al),.4)*(0.5+0.5*Math.abs(Math.sin(i*.009+ch)));dd[i]=(Math.random()*2-1)*e*.28;} }
    const ns = c.createBufferSource(); ns.buffer = ab;
    const lp = c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=5000;
    const ng = c.createGain(); ng.gain.setValueAtTime(0,t+.4); ng.gain.linearRampToValueAtTime(.6,t+.75); ng.gain.exponentialRampToValueAtTime(.001,t+2.8);
    ns.connect(lp); lp.connect(ng); ng.connect(c.destination); ns.start(t+.4); ns.stop(t+3.0);
  } catch(e) {}
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function resize() {
  const stage = document.getElementById('stage');
  sz = Math.max(150, Math.min(stage.clientWidth - 80, stage.clientHeight - 40, 720));
  const cv = document.getElementById('wheelCanvas');
  cv.width = cv.height = sz;

  const pSize = Math.max(16, sz * 0.06);
  const psvg = document.getElementById('ptrSvg');
  psvg.style.width  = (pSize * 1.35) + 'px';
  psvg.style.height = pSize + 'px';
  const pout = document.getElementById('ptrOuter');
  pout.style.right = (-pSize * 0.22) + 'px';
  draw();
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  const cv = document.getElementById('wheelCanvas'); if (!cv) return;
  const ctx = cv.getContext('2d');
  const cx = sz/2, cy = sz/2, R = sz/2 - 2, n = entries.length;
  ctx.clearRect(0, 0, sz, sz);

  if (!n) {
    const grd = ctx.createRadialGradient(cx-R*.2, cy-R*.2, R*.04, cx, cy, R);
    grd.addColorStop(0, '#eef0f1'); grd.addColorStop(.65, '#e0e2e5'); grd.addColorStop(1, '#cdd0d4');
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
    drawHub(ctx, cx, cy);
    return;
  }

  const arc = (Math.PI*2) / n;

  for (let i = 0; i < n; i++) {
    const a0 = ang + i*arc, a1 = a0 + arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle = entries[i].color; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 1.8; ctx.stroke();
  }

  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,.09)'; ctx.lineWidth = 6; ctx.stroke();

  const hubR = sz * 0.078;
  for (let i = 0; i < n; i++) {
    const mid = ang + i*arc + arc/2;
    const lbl = entries[i].label;
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(mid);

    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R-2,-arc/2,arc/2); ctx.closePath(); ctx.clip();

    const textR  = (hubR + R) / 2;
    const arcH   = textR * arc;
    const radL   = R - hubR - 14;
    const fsByH  = Math.floor(arcH * 0.68);
    const fsByW  = Math.floor(radL / (Math.max(1, lbl.length) * 0.54));
    const fs = Math.max(10, Math.min(fsByH, fsByW, Math.floor(sz * 0.135)));

    ctx.font = `600 ${fs}px "Patrick Hand", cursive`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.7)'; ctx.shadowBlur = 3.5;
    ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
    ctx.fillText(lbl, hubR + 12, 0);
    ctx.restore();
  }

  drawHub(ctx, cx, cy);
}

function drawHub(ctx, cx, cy) {
  const hR = sz * 0.078;
  ctx.beginPath(); ctx.arc(cx,cy,hR,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(0,0,0,.26)'; ctx.shadowBlur = 18;
  ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,.07)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,hR*.26,0,Math.PI*2);
  ctx.fillStyle = '#ddd'; ctx.fill();
}

// ─── SPIN ─────────────────────────────────────────────────────────────────────
function spinWheel() {
  if (spinning || !entries.length) return;
  spinning = true;
  document.getElementById('spinOverlay').classList.add('hidden');
  try { getAC().resume(); } catch(e) {}

  const n   = entries.length;
  const arc = (Math.PI * 2) / n;

  // ── Match wheelofnames.com default: ~8–12 seconds total spin ──
  // Their default spinTime is ~10s. Randomise slightly for natural variation.
  const minDur = 8.0, maxDur = 12.0;
  const targetDur = minDur + cryptoRand() * (maxDur - minDur);

  // k ≈ 0.35–0.45: slow enough to look physical, fast enough to finish in ~10s
  const k  = 0.35 + cryptoRand() * 0.10;
  const STOP_SPEED = 0.3;  // raised from 0.015 — stops decisively, no slow crawl
  const omega0 = STOP_SPEED * Math.exp(k * targetDur);

  // Ensure minimum 8 full rotations
  const totalRot = omega0 / k;
  const minTurns = 8 * Math.PI * 2;
  const finalOmega0 = totalRot < minTurns ? (minTurns * k) : omega0;

  let   omega    = finalOmega0;
  let   t0       = null;
  let   lastSeg  = -1;
  let   lastTs   = null;

  function frame(ts) {
    if (!t0) { t0 = ts; lastTs = ts; }

    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;

    omega *= Math.exp(-k * dt);
    ang   += omega * dt;
    draw();

    const ptrAngle = (((-ang) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const seg = Math.floor(ptrAngle / arc) % n;
    if (seg !== lastSeg) {
      lastSeg = seg;
      playTick(Math.min(omega / (finalOmega0 * 0.8), 1));
    }

    if (omega > STOP_SPEED) {
      requestAnimationFrame(frame);
      return;
    }

    const finalPtrAngle = (((-ang) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    winIdx   = Math.floor(finalPtrAngle / arc) % n;
    winLabel = entries[winIdx].label;
    spinning = false;
    document.getElementById('spinOverlay').classList.remove('hidden');

    results.unshift(winLabel);
    document.getElementById('rBadge').textContent = results.length;
    playFanfare();
    launchConfetti(100);
    setTimeout(showWinner, 380);
  }

  requestAnimationFrame(frame);
}

// ─── WINNER ───────────────────────────────────────────────────────────────────
function showWinner() {
  const e  = entries[winIdx];
  const nm = document.getElementById('wName');
  nm.textContent = e ? e.label : '?';
  nm.style.color = e ? e.color : '#202124';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function removeWinner() {
  if (winIdx >= 0 && winIdx < entries.length) entries.splice(winIdx, 1);
  sync(); draw(); winIdx = -1; closeModal();
}
function removeAll() {
  if (winLabel) entries = entries.filter(e => e.label !== winLabel);
  sync(); draw(); winIdx = -1; closeModal();
}

// ─── ENTRIES ─────────────────────────────────────────────────────────────────
function onTA() {
  const lines = document.getElementById('ta').value.split('\n');
  const ne = [];
  lines.forEach(l => {
    const t = l.trim(); if (!t) return;
    const ex = entries.find(e => e.label === t);
    ne.push({ label: t, color: ex ? ex.color : COLORS[ne.length % COLORS.length] });
  });
  entries = ne;
  document.getElementById('eBadge').textContent = entries.length;
  draw();
}

function sync() {
  document.getElementById('ta').value = entries.map(e => e.label).join('\n');
  document.getElementById('eBadge').textContent = entries.length;
}

function shuffle() {
  for (let i = entries.length-1; i > 0; i--) {
    const j = Math.floor(cryptoRand() * (i+1));
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  sync(); draw();
}

function sortEntries() {
  entries.sort((a,b) => a.label.localeCompare(b.label));
  sync(); draw();
}

function renderResults() {
  const el = document.getElementById('resList');
  if (!results.length) { el.innerHTML = '<div style="padding:16px;color:#9aa0a6;font-size:13px">No results yet.</div>'; return; }
  el.innerHTML = results.map((r,i) => {
    const c = entries.find(e => e.label===r);
    const col = c ? c.color : COLORS[i % COLORS.length];
    return `<div class="r-row"><span class="r-num">${i+1}</span><div class="r-dot" style="background:${col}"></div><span>${esc(r)}</span></div>`;
  }).join('');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('tabE').classList.toggle('active', t==='E');
  document.getElementById('tabR').classList.toggle('active', t==='R');
  document.getElementById('vE').style.display = t==='E' ? 'flex' : 'none';
  document.getElementById('vR').style.display = t==='R' ? 'block' : 'none';
  if (t==='R') renderResults();
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
const CC = ['#ea4335','#ffd600','#4285f4','#34a853','#9c27b0','#fb8c00','#fff','#ff80ab','#00e5ff','#ff6d00'];
function launchConfetti(n) {
  for (let i=0; i<n; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    const w = 4 + cryptoRand()*10;
    el.style.cssText = `left:${cryptoRand()*100}vw;background:${CC[Math.floor(cryptoRand()*CC.length)]};width:${w}px;height:${w}px;animation-duration:${1.1+cryptoRand()*2.2}s;animation-delay:${cryptoRand()*.55}s;border-radius:${cryptoRand()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4200);
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', resize);
window.addEventListener('resize', resize);
setTimeout(resize, 40);
document.addEventListener('keydown', e => { if (e.ctrlKey && e.key==='Enter') spinWheel(); });
</script>
